spring.application.name=bikestore-api
server.port=8080
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Configuration for External Session Pooler
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

security.jwt.secret-key=${JWT_SECRET}
security.jwt.expiration-time=86400000

mercadopago.access-token=${MP_ACCESS_TOKEN}
mercadopago.webhook-secret=${MP_WEBHOOK_SECRET}
mercadopago.notification-url=${MP_NOTIFICATION_URL}

google.client.id=${GOOGLE_CLIENT_ID}

aws.region=${AWS_REGION}
aws.s3.bucket.name=${AWS_BUCKET_NAME}

resend.api.key=${RESEND_API_KEY}

spring.data.web.pageable.max-page-size=100

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

app.frontend.url=${FRONTEND_URL}
app.admin.email=${APP_ADMIN_EMAIL:admin@bikestore.local}
app.store.address=Santa Fe 2611, Mar del Plata, Provincia de Buenos Aires
app.email.placeholder-image-url=https://bikestore-pablo-images.s3.us-east-2.amazonaws.com/image_90b45892.png
app.orders.reservation-ttl.pickup-minutes=10
app.orders.reservation-ttl.shipping-quote-hours=24
app.orders.reservation-ttl.quote-ready-hours=2

# Mercado Pago IPN security: allowed IP addresses / CIDR ranges (comma-separated).
# Includes known MP notification ranges (AWS sa-east-1) plus localhost for development.
# Update this list if MP publishes new IP ranges.
mercadopago.allowed-ips=18.231.0.0/16,18.228.0.0/16,52.67.0.0/16,54.232.0.0/16,177.71.0.0/16,127.0.0.1,::1
mercadopago.ip-validation.enabled=false
app.product-images.s3-cleanup.enabled=true

# IPN rate limiting: maximum requests per IP within the rolling window.
webhook.ipn.rate-limit.max-requests=30
webhook.ipn.rate-limit.window-seconds=60

# Google reCAPTCHA v3
recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}
recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify
recaptcha.minimum-score=0.5