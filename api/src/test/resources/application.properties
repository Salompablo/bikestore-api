# ── DataSource: in-memory H2 for tests ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── Security / JWT ──
security.jwt.secret-key=dGVzdC1zZWNyZXQta2V5LWZvci1iaWtlc3RvcmUtYXBpLXRlc3Rz
security.jwt.expiration-time=86400000

# ── MercadoPago ──
mercadopago.access-token=TEST-0000-0000-0000-000000000000
mercadopago.webhook-secret=test-webhook-secret
mercadopago.notification-url=https://localhost/webhook

# ── Google OAuth ──
google.client.id=test-google-client-id.apps.googleusercontent.com

# ── AWS S3 ──
aws.region=us-east-1
aws.s3.bucket.name=test-bucket

# ── Resend ──
resend.api.key=re_test_000000000000000000000000

app.frontend.url=http://localhost:4200
